<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern AI Quiz Pro - 20s Edition</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --success: #00b894;
            --danger: #ff7675;
            --dark: #2d3436;
            --light: #f9f9f9;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #6c5ce7, #00d2ff);
        }

        #game-container {
            background: white;
            width: 95%;
            max-width: 500px;
            min-height: 80vh;
            border-radius: 30px;
            padding: 2rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        #timer-bar {
            position: absolute;
            top: 0; left: 0;
            height: 8px;
            background: var(--primary);
            width: 100%;
            transition: width 1s linear, background-color 0.3s;
        }

        .header-info {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--primary);
            font-size: 1.1rem;
        }

        #timer-text.warning { color: var(--danger); animation: pulse 0.5s infinite; }
        #timer-bar.warning { background-color: var(--danger) !important; }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        #q-text {
            font-size: 1.4rem;
            color: var(--dark);
            margin-bottom: 1.5rem;
            line-height: 1.4;
        }

        .option-btn {
            background: var(--light);
            color: var(--dark);
            border: 2px solid #eee;
            padding: 15px;
            margin: 8px 0;
            border-radius: 15px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .option-btn:hover:not(:disabled) { background: var(--secondary); color: white; transform: translateY(-2px); }

        .btn-correct { background: var(--success) !important; color: white !important; border-color: var(--success); }
        .btn-wrong { background: var(--danger) !important; color: white !important; border-color: var(--danger); }

        .stars-container { color: #f1c40f; font-size: 1.8rem; margin: 15px 0; letter-spacing: 3px; }
        
        #result-box { text-align: center; display: none; }
        .score-circle {
            width: 120px; height: 120px; border-radius: 50%;
            border: 10px solid var(--primary);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; font-size: 1.8rem; font-weight: bold;
        }

        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="timer-bar"></div>
    
    <div id="quiz-area">
        <div class="header-info">
            <span id="q-count">Su'aasha: 1/10</span>
            <span id="timer-text">20s</span>
        </div>
        <h2 id="q-text">Ma diyaar u tahay inaad bilowdo imtixaanka?</h2>
        <div id="input-area">
            <button class="option-btn" style="background: var(--primary); color: white;" onclick="startQuiz()">BILOW IMTIXAANKA</button>
        </div>
    </div>

    <div id="result-box">
        <h2 style="color: var(--primary);">Natiijadaada 🎉</h2>
        <div class="score-circle" id="score-display">0/10</div>
        <div class="stars-container" id="stars-display"></div>
        <p id="email-status" style="color: #666; margin-bottom: 20px;">Email-ka ayaa la dirayaa...</p>
        <button class="option-btn" style="background: var(--primary); color: white;" onclick="location.reload()">DIB U BILOW</button>
    </div>
</div>

<script>
    (function() { emailjs.init("9TO7hHMapqy4U9kNz"); })();

    const questions = [
        { q: "1. Waa kee nabi ugu horeeyay ee Ilaahay soo diray?", options: ["Nabi Muuse (CS)", "Nabi Aadam (CS)", "Nabi Ciise (CS)"], correct: "Nabi Aadam (CS)" },
        { q: "2. Maxay tahay caasimadda dalka Masar?", options: ["Alexandria", "Qaahira (Cairo)", "Giza"], correct: "Qaahira (Cairo)" },
        { q: "3. Immisa rakcadood ayaa salaadda Subax?", options: ["2 rakcadood", "3 rakcadood", "4 rakcadood"], correct: "2 rakcadood" },
        { q: "4. Waa maxay meeraha ugu dhow qorraxda?", options: ["Venus", "Earth", "Mercury"], correct: "Mercury" },
        { q: "5. Yaa ahaa nabi lagu tuuray dab laakiin Ilaahay badbaadiyay?", options: ["Nabi Nuh (CS)", "Nabi Ibraahim (CS)", "Nabi Yuusuf (CS)"], correct: "Nabi Ibraahim (CS)" },
        { q: "6. Waa maxay biyaha ugu badan ee dunida laga helo?", options: ["Webiyada", "Badaha (Ocean)", "Harooyinka"], correct: "Badaha (Ocean)" },
        { q: "7. Immisa tiir ayuu Islaamku leeyahay?", options: ["4 tiir", "5 tiir", "6 tiir"], correct: "5 tiir" },
        { q: "8. Maxamed maku jecel yahay?", options: ["may", "laga yaaba", "haa"], correct: "haa" },
        { q: "9. Waa tee suuradda ugu dheer Qur’aanka Kariimka ah?", options: ["Al-Faatiha", "Al-Ikhlaas", "Al-Baqarah"], correct: "Al-Baqarah" },
        { q: "10. Waa maxay xayawaanka ugu dheereeya dhulka?", options: ["Libaax", "Shabeel (Cheetah)", "Maroodi"], correct: "Shabeel (Cheetah)" }
    ];

    let currentQ = 0; let score = 0; let timeLeft = 20; let timerInterval;

    function startQuiz() { showQuestion(); }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 20;
        updateTimerUI();
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimerUI();
            if(timeLeft <= 0) { 
                clearInterval(timerInterval); 
                nextQuestionAuto(); // Toos u gudbi haddii waqtigu dhamaado
            }
        }, 1000);
    }

    function updateTimerUI() {
        const timerText = document.getElementById('timer-text');
        const timerBar = document.getElementById('timer-bar');
        
        timerText.innerText = timeLeft + "s";
        timerBar.style.width = (timeLeft * 5) + "%"; // 5% * 20 = 100%

        // Digniin 5s ee ugu dambaysa
        if (timeLeft <= 5) {
            timerText.classList.add('warning');
            timerBar.classList.add('warning');
        } else {
            timerText.classList.remove('warning');
            timerBar.classList.remove('warning');
        }
    }

    function showQuestion() {
        if (currentQ >= questions.length) { showResult(); return; }
        
        const q = questions[currentQ];
        document.getElementById('q-count').innerText = `Su'aasha: ${currentQ + 1}/${questions.length}`;
        document.getElementById('q-text').innerText = q.q;
        const area = document.getElementById('input-area');
        area.innerHTML = '';
        startTimer();

        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = (e) => checkAnswer(opt, q.correct, e.target);
            area.appendChild(btn);
        });
    }

    function checkAnswer(sel, cor, btn) {
        clearInterval(timerInterval);
        const container = document.getElementById('game-container');
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);

        if(sel === cor) { 
            score++; 
            btn.classList.add('btn-correct'); 
        } else { 
            btn.classList.add('btn-wrong'); 
            container.classList.add('shake');
            allBtns.forEach(b => { if(b.innerText === cor) b.classList.add('btn-correct'); });
        }

        setTimeout(() => {
            container.classList.remove('shake');
            currentQ++;
            showQuestion();
        }, 1200);
    }

    function nextQuestionAuto() {
        // Markii waqtigu dhamaado isagoo qofku wax dooran
        const container = document.getElementById('game-container');
        container.classList.add('shake');
        
        // Tus jawaabta saxda ah ka hor intaan la gudbin
        const cor = questions[currentQ].correct;
        const allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => {
            b.disabled = true;
            if(b.innerText === cor) b.classList.add('btn-correct');
        });

        setTimeout(() => {
            container.classList.remove('shake');
            currentQ++;
            showQuestion();
        }, 1500);
    }

    function showResult() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('timer-bar').style.display = 'none';
        document.getElementById('result-box').style.display = 'block';
        document.getElementById('score-display').innerText = `${score}/${questions.length}`;
        
        let starsHtml = '';
        for(let i=1; i<=10; i++) {
            starsHtml += i <= score ? '★' : '☆';
        }
        document.getElementById('stars-display').innerText = starsHtml;
        
        sendEmailResult();
    }

    function sendEmailResult() {
        const params = {
            to_name: "Admin",
            user_score: score,
            total_questions: questions.length,
            message: `Natiijo cusub: ${score}/10`
        };

        emailjs.send('service_j2uu8yq','template_8tyi2lk', params)
            .then(() => {
                document.getElementById('email-status').innerText = "✅ Natiijada waa la keydiyey!";

            });
    }
</script>

</body>
</html>
