<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ku soo dhawaaw</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff4da6, #ff0066, #b30047);
            overflow: hidden;
        }

        .setup-container {
            width: 90%;
            max-width: 400px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 40px 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            text-align: center;
            color: white;
            z-index: 10;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .input-field {
            width: 100%;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 16px;
            outline: none;
            margin-bottom: 25px;
            text-align: center;
            transition: 0.3s;
        }

        .input-field::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .input-field:focus {
            background: rgba(255, 255, 255, 0.2);
            border-color: white;
        }

.continue-btn {
    width: 100%;
    padding: 15px;
    border-radius: 15px;
    border: 1px solid rgba(255, 255, 255, 0.4);
    background: rgba(255, 255, 255, 0.9);
    color: #ff0066;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.4s ease;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
}

.continue-btn:hover {
    transform: translateY(-5px) scale(1.02);
    background: #ffffff;
    box-shadow: 0 8px 25px rgba(255, 77, 166, 0.5);
    color: #b30047;
}

.continue-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
        120deg,
        transparent,
        rgba(255, 255, 255, 0.6),
        transparent
    );
    transition: all 0.6s;
}

.continue-btn:hover::before {
    left: 100%;
}

.continue-btn:active {
    transform: translateY(0) scale(0.98);
}

        .heart {
            position: fixed;
            bottom: -50px;
            pointer-events: none;
            animation: floatUp linear forwards;
            z-index: 1;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0.8; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="setup-container">
        <h2>Ku soo Dhawaaw ❤️</h2>
        <p style="margin-bottom: 20px; font-size: 14px; opacity: 0.9;">Fadlan magacaaga qor si aad u sii wadid.</p>
        
        <input type="text" id="userName" class="input-field" placeholder="Magacaaga..." autocomplete="off">
        
        <button class="continue-btn" onclick="startApp()">Continue ➡️</button>
    </div>

    <script>
        function startApp() {
            const nameInput = document.getElementById('userName').value;

            if (nameInput.trim() === "") {
                alert("Fadlan magacaaga qor sxb!");
                return;
            }

            sessionStorage.setItem('senderName', nameInput);
            window.location.href = "Inbox.html";
        }

        function createHeart() {
            const heart = document.createElement("div");
            heart.classList.add("heart");
            const emojis = ["❤️", "💖", "💕", "💗"];
            heart.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            heart.style.left = Math.random() * 100 + "vw";
            heart.style.animationDuration = Math.random() * 3 + 4 + "s";
            heart.style.fontSize = Math.random() * 20 + 15 + "px";
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000);
        }
        setInterval(createHeart, 600);
    </script>
</body>
</html>
