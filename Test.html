<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>EmailJS Test Cusub</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // Public Key-ga cusub
            emailjs.init("9TO7hHMapqy4U9kNz");
        })();
    </script>
</head>
<body>

    <div style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        <h2>EmailJS Tijaabo (Account Cusub)</h2>
        <button id="btn" onclick="sendTestEmail()" style="padding: 10px 20px; cursor: pointer;">
            Dir Email-ka
        </button>
        <p id="status"></p>
    </div>

    <script>
        function sendTestEmail() {
            const statusText = document.getElementById("status");
            const btn = document.getElementById("btn");

            statusText.innerText = "Waa la dirayaa...";
            btn.disabled = true;

            // Xogta loo dirayo Template-kaaga
            const params = {
                from_name: "Maxamed Admin",
                message: "Kani waa tijaabada labaad ee EmailJS, si fiican ayuu u shaqaynayaa!",
                reply_to: "m60051616@gmail.com"
            };

            emailjs.send("service_j2uu8yq", "template_z1r5iah", params)
                .then(function(response) {
                    statusText.innerText = "Email-ku si guul leh ayuu u baxay! (Status: OK)";
                    statusText.style.color = "green";
                    btn.disabled = false;
                }, function(error) {
                    statusText.innerText = "Khalad ayaa dhacay: " + JSON.stringify(error);
                    statusText.style.color = "red";
                    btn.disabled = false;
                    console.log("FAILED...", error);
                });
        }
    </script>

</body>
</html>
